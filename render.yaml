services:
  - name: arista-api
    type: web
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: DATABASE_URL
        fromDatabase:
          name: arista-db
          property: connectionString
      - key: YOUTUBE_API_KEY
        sync: false

  - name: arista-frontend
    type: web
    runtime: static
    buildCommand: "echo 'static'"
    staticPublishPath: frontend


databases:
  - name: arista-db
    databaseName: academy
    user: arista
    plan: basic-256mb
