<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🥋 Arista Academy – Estudiantes</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    padding: 40px;
  }

  h1 {
    margin-bottom: 20px;
    color: #e10600;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    margin-bottom: 20px;
  }

  th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: left;
  }

  th {
    background: #222;
    color: white;
  }

  tr:hover { background: #f1f1f1; }

  .al_dia { background-color: #d4edda; }       /* verde suave */
  .atrasado { background-color: #f8d7da; }     /* rojo suave */
  .pendiente { background-color: #fff3cd; }    /* amarillo suave */

  button {
    padding: 8px 12px;
    margin-top: 10px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
  }

  .add-btn { background: #e10600; color: white; }
  .delete-btn { background: #222; color: white; margin-left: 10px; }

  form {
    background: #d9d9d9;
    padding: 20px;
    border-radius: 6px;
    margin-bottom: 20px;
  }

  input, select { margin-right: 10px; padding: 6px; }
  tfoot td { font-weight: bold; }
  select, input[type=date] { min-width: 100px; }
</style>
</head>
<body>

<h1>🥋 Arista Academy – Estudiantes</h1>

<!-- FORMULARIO -->
<form id="studentForm">
  <input type="text" id="name" placeholder="Nombre" required>
  <select id="belt" required>
    <option value="White">White</option>
    <option value="Blue">Blue</option>
    <option value="Purple">Purple</option>
    <option value="Brown">Brown</option>
    <option value="Black">Black</option>
  </select>
  <select id="age" required></select>
  <input type="number" id="monthly_fee" placeholder="Mensualidad" required>
  <input type="date" id="payment_date" required>
  <select id="status" required>
    <option value="al_dia">Al día</option>
    <option value="atrasado">Atrasado</option>
    <option value="pendiente">Pendiente</option>
  </select>
  <button class="add-btn" type="submit">Agregar estudiante</button>
</form>

<!-- TABLA -->
<table>
  <thead>
    <tr>
      <th>Seleccionar</th>
      <th>ID</th>
      <th>Nombre</th>
      <th>Cinturón</th>
      <th>Edad</th>
      <th>Mensualidad</th>
      <th>Fecha de pago</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="studentsTable"></tbody>
  <tfoot>
    <tr>
      <td colspan="5">Total Mensualidades</td>
      <td colspan="3" id="totalFee">₡0</td>
    </tr>
  </tfoot>
</table>

<button class="delete-btn" id="deleteBtn">Eliminar seleccionados</button>

<script>
const API_URL = "http://192.168.64.2:3000/students";
const tableBody = document.getElementById("studentsTable");
const totalFeeEl = document.getElementById("totalFee");

// ===================== GENERAR EDADES FORM
const ageSelectForm = document.getElementById("age");
for(let i = 4; i <= 80; i++) {
  const option = document.createElement("option");
  option.value = i;
  option.textContent = i;
  ageSelectForm.appendChild(option);
}

// ===================== CARGAR ESTUDIANTES
async function loadStudents() {
  tableBody.innerHTML = "";
  let total = 0;

  try {
    const res = await fetch(API_URL);
    const students = await res.json();

    students.forEach((s, index) => {
      total += Number(s.monthly_fee || 0);
      const displayId = index + 1;

      // Opciones de edad
      let ageOptions = '';
      for(let i=4;i<=80;i++){
        ageOptions += `<option value="${i}" ${i==s.age?'selected':''}>${i}</option>`;
      }

      // Clase de fila según status
      let rowClass = s.status || 'pendiente'; // fallback
      const row = document.createElement("tr");
      row.className = rowClass;

      row.innerHTML = `
        <td><input type="checkbox" data-id="${s.id}"></td>
        <td>${displayId}</td>
        <td>${s.name}</td>
        <td>
          <select class="belt-select" data-id="${s.id}">
            <option value="White" ${s.belt==='White'?'selected':''}>White</option>
            <option value="Blue" ${s.belt==='Blue'?'selected':''}>Blue</option>
            <option value="Purple" ${s.belt==='Purple'?'selected':''}>Purple</option>
            <option value="Brown" ${s.belt==='Brown'?'selected':''}>Brown</option>
            <option value="Black" ${s.belt==='Black'?'selected':''}>Black</option>
          </select>
        </td>
        <td>
          <select class="age-select" data-id="${s.id}">
            ${ageOptions}
          </select>
        </td>
        <td>₡${s.monthly_fee ?? ''}</td>
        <td><input type="date" class="payment-date" data-id="${s.id}" value="${s.payment_date ?? ''}"></td>
        <td>
          <select class="status-select" data-id="${s.id}">
            <option value="al_dia" ${s.status==='al_dia'?'selected':''}>Al día</option>
            <option value="atrasado" ${s.status==='atrasado'?'selected':''}>Atrasado</option>
            <option value="pendiente" ${s.status==='pendiente'?'selected':''}>Pendiente</option>
          </select>
        </td>
      `;
      tableBody.appendChild(row);
    });

    totalFeeEl.textContent = `₡${total}`;
  } catch(err) {
    console.error(err);
    alert("Error cargando estudiantes");
  }
}

// ===================== AGREGAR ESTUDIANTE
document.getElementById("studentForm").addEventListener("submit", async e => {
  e.preventDefault();
  const student = {
    name: document.getElementById("name").value,
    belt: document.getElementById("belt").value,
    age: Number(document.getElementById("age").value),
    monthly_fee: Number(document.getElementById("monthly_fee").value),
    payment_date: document.getElementById("payment_date").value,
    status: document.getElementById("status").value
  };

  try {
    const res = await fetch(API_URL, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(student)
    });
    if(!res.ok) throw new Error("Error creando estudiante");
    e.target.reset();
    loadStudents();
  } catch(err) {
    console.error(err);
    alert(err.message);
  }
});

// ===================== ELIMINAR SELECCIONADOS
document.getElementById("deleteBtn").addEventListener("click", async () => {
  const selected = [...document.querySelectorAll('input[type=checkbox]:checked')].map(cb => cb.dataset.id);
  for(const id of selected){
    await fetch(`${API_URL}/${id}`, { method: "DELETE" });
  }
  loadStudents();
});

tableBody.addEventListener("change", async e => {
  const target = e.target;
  const id = target.dataset.id;
  if (!id) return;

  const row = target.closest("tr");

  const payload = {
    name: row.querySelector("td:nth-child(3)").textContent,
    belt: row.querySelector(".belt-select").value,
    age: Number(row.querySelector(".age-select").value),
    monthly_fee: Number(
      row.querySelector("td:nth-child(6)").textContent.replace("₡","")
    ) || 0,
    payment_date: row.querySelector(".payment-date").value,
    status: row.querySelector(".status-select").value
  };

  try {
    const res = await fetch(`${API_URL}/${id}`, {
      method: "PATCH", // luego probamos PUT si hace falta
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    console.log("STATUS:", res.status);

    const text = await res.text();
    console.log("RESPUESTA BACKEND:", text);

    if (!res.ok) {
      alert("Error backend: " + res.status);
      return;
    }

    row.className = payload.status;

  } catch (err) {
    console.error("ERROR FETCH:", err);
  }
});

// ===================== CARGAR AL INICIO
loadStudents();
</script>
</body>
</html>
