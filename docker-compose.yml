services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: academy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./backend
    depends_on:
      - db
    environment:
      PORT: 3000
      JWT_SECRET: arista-local-dev-secret
      JWT_EXPIRES_IN: 12h
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: academy
    ports:
      - "3000:3000"

  worker:
    build: ./backend
    depends_on:
      - db
    environment:
      JWT_SECRET: arista-local-dev-secret
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: academy
      JOB_INTERVAL_MINUTES: 60
    command: ["node", "worker.js"]

  frontend:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
